<!doctype html>
<html lang="es">
<head>

  <title>RetinaAI - Infografía</title>
  <style>
    body {

      font-family: Inter, "Segoe UI", Arial, sans-serif;
      background: #eef5fb;
      color: #102033;
    }

    main {
      width: min(520px, calc(100% - 32px));
      padding: 28px;
      border-radius: 20px;
      background: #ffffff;
      border: 1px solid #d7e2ee;
      box-shadow: 0 24px 70px rgba(20, 45, 75, .14);
      text-align: center;
    }

    img {
      width: 58px;
      height: 58px;
      border-radius: 16px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 26px;
    }

    p {
      margin: 0 0 18px;
      color: #5d7088;
      line-height: 1.5;
    }

    a {
      display: inline-block;
      padding: 12px 16px;
      border-radius: 12px;
      background: #1d4ed8;
      color: #ffffff;
      text-decoration: none;
      font-weight: 800;
    }
