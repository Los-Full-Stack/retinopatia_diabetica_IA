services:
  - type: web
    name: retinaai
    env: python
    plan: free
    buildCommand: pip install --index-url https://download.pytorch.org/whl/cpu torch torchvision && pip install -r requirements-render.txt
    startCommand: uvicorn webapp.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: RETINAAI_ENABLE_GRADCAM
        value: "false"
      - key: RETINAAI_ENABLE_TTA_INFERENCE
        value: "false"
      - key: OMP_NUM_THREADS
        value: "1"
      - key: MKL_NUM_THREADS
        value: "1"
